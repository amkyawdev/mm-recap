version: '3.8'

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Local Appwrite (optional - for full local development)
  # Note: For most cases, using cloud.appwrite.io is recommended
  appwrite:
    image: appwrite/appwrite:1.5
    ports:
      - "80:80"
      - "443:443"
    environment:
      - _APP_ENV=development
      - _APP_DEBUG=true
      - _APP_PORT=80
      - _APP_DOMAIN=localhost
      - _APP_STORAGE_DEVICE=local
      - _APP_STORAGE_S3_ACCESS_KEY=minioadmin
      - _APP_STORAGE_S3_SECRET=minioadmin
      - _APP_STORAGE_S3_BUCKET=recap
      - _APP_STORAGE_S3_REGION=us-east-1
      - _APP_STORAGE_S3_ENDPOINT=http://minio:9000
    volumes:
      - appwrite_data:/storage
    depends_on:
      - minio

volumes:
  minio_data:
  redis_data:
  appwrite_data:
